<section class="contenedor-carrito">

<h1>Carrito de Compras</h1>

<div id="lista-carrito"></div>

<h2 id="total"></h2>

<div class="acciones-carrito">

<button onClick="vaciarCarrito()" class="btn-comprar">
Vaciar carrito
</button>

Comprar ahora
</a>

</div>

<footer class="footer-contacto">
<div class="footer-contenido">

<p>Tel&eacute;fono: 0958894591</p>
<p>Facebook: CaffeDolceVita</p>
<p>Instagram: CaffeDolce_Vita</p>
<p>Direcci&oacute;n: Pichincha, Machachi, Aloas&iacute;</p>

</div>
</footer>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let contenedor = document.getElementById("lista-carrito");
let totalTexto = document.getElementById("total");

/* MAPA DE IM�GENES */
const imagenes = {
"Caf� Premium de altura": "producto1.jpg",
"Caf� tostado artesanal": "producto2.jpg",
"Caf� org�nico seleccionado": "producto3.jpg",
"Granos de caf� de exportaci�n": "producto4.png",
"Cacao fino ecuatoriano": "producto5.png",
"Caf� molido tradicional": "producto6.png",
"Caf� gourmet": "producto7.jpg",
"Selecci�n especial de caf�": "producto8.png",
"Cacao de alta calidad": "producto9.jpg"
};

function mostrarCarrito(){

contenedor.innerHTML = "";

let total = 0;

if(carrito.length === 0){
    contenedor.innerHTML = "<p>Tu carrito est&aacute; vac&iacuteo</p>";
    totalTexto.textContent = "";
    return;
}

carrito.forEach((producto, index) => {

let subtotal = producto.precio * producto.cantidad;
total += subtotal;

let imagen = producto.imagen;

let div = document.createElement("div");
div.classList.add("item-carrito");

div.innerHTML = `
<div style="display:flex; align-items:center; gap:15px;">

<div class="img-producto">
<img src="${imagen}">
</div>

<div>
<p><strong>${producto.nombre}</strong></p>
<p>Cantidad: ${producto.cantidad}</p>
<p>Precio: $${producto.precio}</p>
<p>Subtotal: $${subtotal}</p>

<button onclick="eliminar(${index})">Eliminar</button>
</div>

</div>
`;

contenedor.appendChild(div);

});

totalTexto.textContent = "Total: $" + total;

}

/* ELIMINAR */

function eliminar(index){

carrito.splice(index,1);
localStorage.setItem("carrito", JSON.stringify(carrito));

mostrarCarrito();
actualizarContador();

}

/* VACIAR */

function vaciarCarrito(){

localStorage.removeItem("carrito");
carrito = [];

mostrarCarrito();
actualizarContador();

}

/* CONTADOR */

function actualizarContador(){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let total = 0;

carrito.forEach(p => {
    total += p.cantidad;
});

let contador = document.getElementById("contador-carrito");

if(contador){
    contador.textContent = total;
}

}

/* INICIAR */

mostrarCarrito();
actualizarContador();

</script>

</body>
